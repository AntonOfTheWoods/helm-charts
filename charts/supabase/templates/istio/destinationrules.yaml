{{- /*
Optional DestinationRules for subsets / connection pools; minimal default to enable mTLS if used cluster-wide.
*/}}
{{- if .Values.istio.enabled }}
{{- $ns := include "common.names.namespace" . }}
{{- $domain := .Values.clusterDomain }}
{{- $hosts := list
    (printf "%s.%s.svc.%s" (include "supabase.auth.fullname" .) $ns $domain)
    (printf "%s.%s.svc.%s" (include "supabase.rest.fullname" .) $ns $domain)
    (printf "%s.%s.svc.%s" (include "supabase.realtime.fullname" .) $ns $domain)
    (printf "%s.%s.svc.%s" (include "supabase.storage.fullname" .) $ns $domain)
    (printf "%s.%s.svc.%s" (include "supabase.meta.fullname" .) $ns $domain)
    (printf "%s.%s.svc.%s" (include "supabase.functions.fullname" .) $ns $domain)
}}
{{- range $hosts }}
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ (printf "%s" .) | replace "." "-" }}-dr
  namespace: {{ $ns | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" $.Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
spec:
  host: {{ . }}
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
{{- end }}
{{- end }}
