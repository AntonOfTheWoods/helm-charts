{{- /*
Minimal Istio AuthorizationPolicies to mirror Kong key-auth + ACL behavior using static keys.
- Open endpoints: /auth/v1/verify, /auth/v1/callback, /auth/v1/authorize
- Protected: /auth/v1/*, /rest/v1/*, /realtime/v1/* require apikey equal to anon or service key
- Meta admin-only: /pg/* requires service key
Keys are read from Secret `supabase-jwt` (anon-key, service-key), with optional overrides via .Values.jwt.
*/}}
{{- if and .Values.istio.enabled .Values.istio.authz.enabled }}
{{- include "supabase.istio.authz.selectorCheck" . }}
{{- $ns := include "common.names.namespace" . -}}
{{- $jwtSecret := lookup "v1" "Secret" $ns "supabase-jwt" -}}
{{- $anonKey := "" -}}
{{- if .Values.jwt.anonKey -}}
  {{- $anonKey = .Values.jwt.anonKey -}}
{{- else if $jwtSecret -}}
  {{- $anonKey = (index $jwtSecret.data "anon-key" | default "" | b64dec) -}}
{{- end -}}
{{- $svcKey := "" -}}
{{- if .Values.jwt.serviceKey -}}
  {{- $svcKey = .Values.jwt.serviceKey -}}
{{- else if $jwtSecret -}}
  {{- $svcKey = (index $jwtSecret.data "service-key" | default "" | b64dec) -}}
{{- end -}}
{{- if and .Values.istio.authz.enabled (not (or $anonKey $svcKey)) -}}
{{- fail "istio.authz.enabled but neither anon nor service key could be resolved (set jwt.anonKey/jwt.serviceKey or provide supabase-jwt secret)" -}}
{{- end -}}
---

apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "common.names.fullname" . }}-allow-open
  namespace: {{ include "supabase.istio.ingress.namespace" . }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
spec:
  selector:
    matchLabels:
      {{- if .Values.istio.gatewaySelector }}
{{ toYaml .Values.istio.gatewaySelector | indent 6 }}
      {{- else }}
      istio: ingressgateway
      {{- end }}
  action: ALLOW
  rules:
    - to:
        - operation:
            paths: ["/auth/v1/verify*", "/auth/v1/callback*", "/auth/v1/authorize*"]
    - to:
        - operation:
            paths: ["/functions/v1/*", "/storage/v1/*"]

---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "common.names.fullname" . }}-allow-protected
  namespace: {{ include "supabase.istio.ingress.namespace" . }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
spec:
  selector:
    matchLabels:
      {{- if .Values.istio.gatewaySelector }}
{{ toYaml .Values.istio.gatewaySelector | indent 6 }}
      {{- else }}
      istio: ingressgateway
      {{- end }}
  action: ALLOW
  rules:
    - to:
        - operation:
            paths:
              - "/auth/v1/*"
              - "/rest/v1/*"
              - "/realtime/v1/*"
      when:
        - key: request.headers[apikey]
          values:
            {{- if $anonKey }}
            - {{ $anonKey | quote }}
            {{- end }}
            {{- if $svcKey }}
            - {{ $svcKey | quote }}
            {{- end }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "common.names.fullname" . }}-meta-admin-only
  namespace: {{ include "supabase.istio.ingress.namespace" . }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
spec:
  selector:
    matchLabels:
      {{- if .Values.istio.gatewaySelector }}
{{ toYaml .Values.istio.gatewaySelector | indent 6 }}
      {{- else }}
      istio: ingressgateway
      {{- end }}
  action: ALLOW
  rules:
    - to:
        - operation:
            paths: ["/pg/*"]
      when:
        - key: request.headers[apikey]
          values:
            {{- if $svcKey }}
            - {{ $svcKey | quote }}
            {{- end }}
---
{{/*
NOTE: An explicit deny-all policy was removed. In Istio, if any ALLOW AuthorizationPolicy
selects a workload, the default becomes deny-by-default for unmatched requests. Therefore
the allow-open and allow-protected policies already restrict traffic; an additional global
DENY (which is evaluated first) would unconditionally block even allowed paths. */}}
{{- end }}
