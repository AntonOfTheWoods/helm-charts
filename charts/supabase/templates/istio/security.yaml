{{- /*
DENY-only AuthorizationPolicies (Option B):
  - No ALLOW policies so non-Supabase traffic on the shared gateway is unaffected.
  - We deny requests to protected Supabase API paths when the apikey header is missing/invalid.
  - Separate stricter deny for /pg/* requiring the service key.
  - We intentionally do NOT enforce auth key on the small set of public auth endpoints, functions, or storage here to avoid enumerating exclusions.
Limitations:
  - Pattern matching with wildcards in AuthorizationPolicy 'paths' is limited; we use literal prefixes (Istio treats entries as exact or prefix depending on implementation). Adjust as needed.
  - If you need to protect additional endpoints, extend the path lists below.
*/}}
{{- if and .Values.istio.enabled .Values.istio.authz.enabled (eq (default "gateway" .Values.istio.authz.mode) "gateway") }}
{{- $ns := include "common.names.namespace" . -}}
{{- $jwtSecret := lookup "v1" "Secret" $ns "supabase-jwt" -}}
{{- $anonKey := "" -}}
{{- if .Values.jwt.anonKey -}}
  {{- $anonKey = .Values.jwt.anonKey -}}
{{- else if $jwtSecret -}}
  {{- $anonKey = (index $jwtSecret.data "anon-key" | default "" | b64dec) -}}
{{- end -}}
{{- $svcKey := "" -}}
{{- if .Values.jwt.serviceKey -}}
  {{- $svcKey = .Values.jwt.serviceKey -}}
{{- else if $jwtSecret -}}
  {{- $svcKey = (index $jwtSecret.data "service-key" | default "" | b64dec) -}}
{{- end -}}
{{- if (not $anonKey) -}}
{{- fail "Required anon key missing: set .Values.jwt.anonKey or create Secret supabase-jwt with key 'anon-key'" -}}
{{- end -}}
{{- if (not $svcKey) -}}
{{- fail "Required service key missing: set .Values.jwt.serviceKey or create Secret supabase-jwt with key 'service-key'" -}}
{{- end -}}
{{- $hosts := .Values.istio.hosts | default (list) -}}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "common.names.fullname" . }}-deny-protected
  namespace: {{ include "supabase.istio.ingress.namespace" . }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
spec:
  selector:
    matchLabels:
      {{- if .Values.istio.gatewaySelector }}
{{ toYaml .Values.istio.gatewaySelector | indent 6 }}
      {{- else }}
      istio: ingressgateway
      {{- end }}
  action: DENY
  rules:
    - to:
        - operation:
            {{- if $hosts }}
            hosts:
            {{- range $h := $hosts }}
              - {{ $h | quote }}
            {{- end }}
            {{- end }}
            # Exempt only HTTP OPTIONS (CORS preflight) requests from this DENY rule.
            # Istio AuthorizationPolicy supports method filtering via operation.methods / operation.notMethods.
            # We use notMethods: ["OPTIONS"] so that browser preflight succeeds without needing the apikey header,
            # while all other methods (GET/POST/PUT/DELETE/PATCH, etc.) remain subject to the header requirement.
            notMethods:
              - "OPTIONS"
            paths:
              - "/rest/v1/"
              - "/rest/v1/*"
              - "/realtime/v1/"
              - "/realtime/v1/*"
            # NOTE: /auth/v1/* excluded again to avoid CORS issues on token endpoint (GoTrue supplies its own CORS headers).
      when:
        - key: request.headers[apikey]
          notValues:
            {{- if $anonKey }}
            - {{ $anonKey | quote }}
            {{- end }}
            {{- if $svcKey }}
            - {{ $svcKey | quote }}
            {{- end }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "common.names.fullname" . }}-deny-meta
  namespace: {{ include "supabase.istio.ingress.namespace" . }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
spec:
  selector:
    matchLabels:
      {{- if .Values.istio.gatewaySelector }}
{{ toYaml .Values.istio.gatewaySelector | indent 6 }}
      {{- else }}
      istio: ingressgateway
      {{- end }}
  action: DENY
  rules:
    - to:
        - operation:
            {{- if $hosts }}
            hosts:
            {{- range $h := $hosts }}
              - {{ $h | quote }}
            {{- end }}
            {{- end }}
            notMethods:
              - "OPTIONS"
            paths:
              - "/pg/"
              - "/pg/*"
      when:
        - key: request.headers[apikey]
          notValues:
            {{- if $svcKey }}
            - {{ $svcKey | quote }}
            {{- else }}
            - "__no_service_key_configured__"
            {{- end }}
{{- end }}
