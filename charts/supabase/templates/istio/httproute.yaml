{{- if .Values.istio.enabled }}
{{- /* Determine parent Gateway reference: either the one we create or an existing shared one */ -}}
{{- $autoGwName := printf "%s-gateway" (include "common.names.fullname" .) -}}
{{- $createdGwName := .Values.gateway.name | default $autoGwName -}}
{{- $parentGwName := ternary $createdGwName (.Values.gateway.existing.name) ( .Values.gateway.create ) -}}
{{- $parentGwNamespace := (ternary (.Values.gateway.namespace | default (include "supabase.istio.ingress.namespace" .)) (.Values.gateway.existing.namespace) (.Values.gateway.create)) -}}
{{- if and (not .Values.gateway.create) (or (empty .Values.gateway.existing.name) (empty .Values.gateway.existing.namespace)) }}
{{- fail "gateway.create is false; you must set gateway.existing.name and gateway.existing.namespace" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "common.names.fullname" . }}-api
  namespace: {{ include "common.names.namespace" . }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
    app.kubernetes.io/component: ingress
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $parentGwName }}
      namespace: {{ $parentGwNamespace }}
  hostnames:
    {{- include "supabase.istio.validatedHosts" . | nindent 4 }}
    - {{ include "supabase.api.baseHost" . | quote }}
  rules:
    # functions (strip /functions/v1/) - one rule per method (exclude OPTIONS)
    {{- range $m := list "GET" "POST" "PUT" "PATCH" "DELETE" }}
    - matches:
        - path: { type: PathPrefix, value: /functions/v1/ }
          method: {{ $m }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Vary
                value: "Origin"
      backendRefs:
        - name: {{ include "supabase.functions.fullname" $ }}
          port: {{ $.Values.functions.service.ports.http }}
    {{- end }}


    # auth wildcard (strip /auth/v1/)
    {{- range $m := list "GET" "POST" "PUT" "PATCH" "DELETE" }}
    - matches:
        - path: { type: PathPrefix, value: /auth/v1/ }
          method: {{ $m }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Vary
                value: "Origin"
      backendRefs:
        - name: {{ include "supabase.auth.fullname" $ }}
          port: {{ $.Values.auth.service.ports.http }}
    {{- end }}


    # realtime (rewrite to /socket)
    {{- range $m := list "GET" "POST" }}
    - matches:
        - path: { type: PathPrefix, value: /realtime/v1/ }
          method: {{ $m }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /socket
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Vary
                value: "Origin"
      backendRefs:
        - name: {{ include "supabase.realtime.fullname" $ }}
          port: {{ $.Values.realtime.service.ports.http }}
    {{- end }}


    # pg-meta (strip /pg/)
    - matches:
        - path:
            type: PathPrefix
            value: /pg/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ include "supabase.meta.fullname" . }}
          port: {{ .Values.meta.service.ports.http }}
{{- end }}
