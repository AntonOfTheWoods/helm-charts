{{- /*
Ambient waypoint proxy (L7) for the namespace.

Istio implements a waypoint via a Gateway (Gateway API) with:
  gatewayClassName: istio-waypoint
  metadata.labels["istio.io/waypoint-for"] = service|workload|all (default service)
This file always renders a namespace-level (service) waypoint when istio.enabled.

NOTE: You must label the namespace to actually use it:
  kubectl label namespace <ns> istio.io/use-waypoint={{ include "common.names.fullname" . }}-waypoint --overwrite

Without that label, the waypoint is inert and traffic stays L4-only (ztunnel).
*/ -}}
{{- if .Values.istio.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "common.names.fullname" . }}-waypoint
  namespace: {{ include "common.names.namespace" . }}

  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" . ) | nindent 4 }}
    istio.io/waypoint-for: service
    app.kubernetes.io/part-of: supabase
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
{{- end }}
