{{- /*
Istio Gateway to replace Kong Ingress. Uses dummy host; customize via .Values.istio.hosts
*/}}
{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: {{ include "common.names.fullname" . }}-gateway
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
    app.kubernetes.io/component: ingress
spec:
  selector:
    {{- /* default Istio ingressgateway selector; override in values if needed */}}
    {{- if .Values.istio.gatewaySelector }}
{{ toYaml .Values.istio.gatewaySelector | indent 4 }}
    {{- else }}
    istio: ingressgateway
    {{- end }}
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        {{- if .Values.istio.hosts }}
        {{- toYaml .Values.istio.hosts | nindent 8 }}
        {{- else }}
        - "supabase.example.com"
        {{- end }}
      {{- if .Values.istio.redirectToTLS }}
      tls:
        httpsRedirect: true
      {{- end }}
    {{- if .Values.istio.tls.enabled }}
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        {{- if .Values.istio.hosts }}
        {{- toYaml .Values.istio.hosts | nindent 8 }}
        {{- else }}
        - "supabase.example.com"
        {{- end }}
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.istio.tls.credentialName | default (printf "%s-tls" (include "common.names.fullname" .)) | quote }}
    {{- end }}
{{- end }}
