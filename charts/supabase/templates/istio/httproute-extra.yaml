{{- if .Values.gateway.enabled }}
{{- $autoGwName := printf "%s-gateway" (include "common.names.fullname" .) -}}
{{- $createdGwName := .Values.gateway.name | default $autoGwName -}}
{{- $parentGwName := ternary $createdGwName (.Values.gateway.existing.name) ( .Values.gateway.create ) -}}
{{- $parentGwNamespace := (ternary (.Values.gateway.namespace | default (include "supabase.gateway.ingress.namespace" .)) (.Values.gateway.existing.namespace) (.Values.gateway.create)) -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "common.names.fullname" . }}-api-extra
  namespace: {{ include "common.names.namespace" . }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
    app.kubernetes.io/component: ingress
spec:
  parentRefs:
    - kind: ListenerSet
      name: {{ .Values.gateway.listenerset.name | default (printf "%s-gateway" (include "common.names.fullname" .)) }}

  hostnames:
    {{- include "supabase.gateway.validatedHosts" . | nindent 4 }}
    - {{ include "supabase.api.baseHost" . | quote }}
  rules:
    # OAuth 2.0 Authorization Server Metadata (RFC 8414)
    - matches:
        {{- range $m := list "GET" }}
        - path: { type: Exact, value: /.well-known/oauth-authorization-server }
          method: {{ $m }}
        {{- end }}
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Vary
                value: "Origin"
      backendRefs:
        - name: {{ include "supabase.auth.fullname" $ }}
          port: {{ $.Values.auth.service.ports.http }}

    # auth fixed endpoints (/verify)
    - matches:
        {{- range $m := list "GET" "POST" }}
        - path: { type: PathPrefix, value: /auth/v1/verify }
          method: {{ $m }}
        {{- end }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /verify
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Vary
                value: "Origin"
      backendRefs:
        - name: {{ include "supabase.auth.fullname" $ }}
          port: {{ $.Values.auth.service.ports.http }}

    # auth fixed endpoints (/callback)
    - matches:
        {{- range $m := list "GET" "POST" }}
        - path: { type: PathPrefix, value: /auth/v1/callback }
          method: {{ $m }}
        {{- end }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /callback
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Vary
                value: "Origin"
      backendRefs:
        - name: {{ include "supabase.auth.fullname" $ }}
          port: {{ $.Values.auth.service.ports.http }}

    # auth fixed endpoints (/authorize)
    - matches:
        {{- range $m := list "GET" "POST" }}
        - path: { type: PathPrefix, value: /auth/v1/authorize }
          method: {{ $m }}
        {{- end }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /authorize
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Vary
                value: "Origin"
      backendRefs:
        - name: {{ include "supabase.auth.fullname" $ }}
          port: {{ $.Values.auth.service.ports.http }}

    # rest (strip /rest/v1/)
    - matches:
        - path: { type: PathPrefix, value: /rest/v1/ }
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Vary
                value: "Origin"
      backendRefs:
        - name: {{ include "supabase.rest.fullname" $ }}
          port: {{ $.Values.rest.service.ports.http }}

    # storage (strip /storage/v1/, add Forwarded header)
    - matches:
        - path: { type: PathPrefix, value: /storage/v1/ }
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: Forwarded
                value: "proto=https"
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Vary
                value: "Origin"
      backendRefs:
        - name: {{ include "supabase.storage.fullname" $ }}
          port: {{ $.Values.storage.service.ports.http }}
{{- end }}
