{{- /*
Waypoint-level AuthorizationPolicies enforcing Supabase API key model (mandatory when istio.enabled).
Strategy:
1. Public (no key) access: /auth/v1/verify, /auth/v1/callback, /auth/v1/authorize
2. Anon OR Service key required: /auth/v1/*, /rest/v1/*, /realtime/v1/*, /storage/v1/*, /functions/v1/*
3. Service key ONLY: /pg/*
Implicit deny for everything else.

Key sourcing precedence:
  a. Explicit values.jwt.{anonKey,serviceKey}
  b. Data in Secret (lookup) named global.jwt.existingSecret (same namespace) with keys defined by
     global.jwt.existingSecretAnonKey / global.jwt.existingSecretServiceKey (defaults already in values.yaml)

If a key is still empty after lookup its rule will render without values so it never matches (fail-closed).
*/ -}}

{{- if .Values.istio.enabled }}

{{- /* Determine parent Gateway reference: either the one we create or an existing shared one */ -}}
{{- $autoGwName := printf "%s-gateway" (include "common.names.fullname" .) -}}
{{- $createdGwName := .Values.istio.gateway.name | default $autoGwName -}}
{{- $parentGwName := ternary $createdGwName (.Values.istio.gateway.existing.name) ( .Values.istio.gateway.create ) -}}
{{- $parentGwNamespace := (ternary (.Values.istio.gateway.namespace | default (include "supabase.istio.ingress.namespace" .)) (.Values.istio.gateway.existing.namespace) (.Values.istio.gateway.create)) -}}
{{- if and (not .Values.istio.gateway.create) (or (empty .Values.istio.gateway.existing.name) (empty .Values.istio.gateway.existing.namespace)) }}
{{- fail "istio.gateway.create is false; you must set istio.gateway.existing.name and istio.gateway.existing.namespace" }}
{{- end }}
{{- $ctx := . }}
{{- $ns := include "common.names.namespace" . }}
{{- $anonKey := (default "" .Values.jwt.anonKey) }}
{{- $serviceKey := (default "" .Values.jwt.serviceKey) }}
{{- if and (not $anonKey) .Values.global.jwt.existingSecret }}
  {{- $secret := lookup "v1" "Secret" $ns .Values.global.jwt.existingSecret }}
  {{- if $secret }}
    {{- $raw := index $secret.data (.Values.global.jwt.existingSecretAnonKey) | default "" }}
    {{- if $raw }}{{- $anonKey = $raw | b64dec }}{{- end }}
  {{- end }}
{{- end }}
{{- if and (not $serviceKey) .Values.global.jwt.existingSecret }}
  {{- $secret := lookup "v1" "Secret" $ns .Values.global.jwt.existingSecret }}
  {{- if $secret }}
    {{- $raw := index $secret.data (.Values.global.jwt.existingSecretServiceKey) | default "" }}
    {{- if $raw }}{{- $serviceKey = $raw | b64dec }}{{- end }}
  {{- end }}
{{- end }}
{{- $haveAnon := gt (len (trim $anonKey)) 0 }}
{{- $haveService := gt (len (trim $serviceKey)) 0 }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "common.names.fullname" . }}-open
  namespace: {{ $parentGwNamespace }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ctx ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $parentGwName }}

  action: ALLOW
  # Applies to all workloads in namespace (waypoint enforces) for specific open paths
  rules:
    - to:
        - operation:
            paths:
              - "/auth/v1/verify"
              - "/auth/v1/callback"
              - "/auth/v1/authorize"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "common.names.fullname" . }}-anon-or-service
  namespace: {{ $parentGwNamespace }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ctx ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $parentGwName }}

  action: ALLOW
  rules:
    - when:
        - key: request.headers[apikey]
          {{- if and $haveAnon $haveService }}
          values:
            - {{ $anonKey | quote }}
            - {{ $serviceKey | quote }}
          {{- else if $haveAnon }}
          values:
            - {{ $anonKey | quote }}
          {{- else if $haveService }}
          values:
            - {{ $serviceKey | quote }}
          {{- end }}
      to:
        - operation:
            paths:
              - "/auth/v1/*"
              - "/rest/v1/*"
              - "/realtime/v1/*"
              - "/storage/v1/*"
              - "/functions/v1/*"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "common.names.fullname" . }}-service-only
  namespace: {{ $parentGwNamespace }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ctx ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $parentGwName }}

  action: ALLOW
  rules:
    - when:
        - key: request.headers[apikey]
          {{- if $haveService }}
          values:
            - {{ $serviceKey | quote }}
          {{- else }}
          # No service key provided; no values means rule will never match (implicit lock-down).
          {{- end }}
      to:
        - operation:
            paths:
              - "/pg/*"
{{- end }}
