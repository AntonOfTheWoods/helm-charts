{{- if .Values.istio.enabled }}
{{- $autoGwName := printf "%s-gateway" (include "common.names.fullname" .) -}}
{{- $createdGwName := .Values.istio.gateway.name | default $autoGwName -}}
{{- $parentGwName := ternary $createdGwName (.Values.istio.gateway.existing.name) ( .Values.istio.gateway.create ) -}}
{{- $parentGwNamespace := (ternary (.Values.istio.gateway.namespace | default (include "supabase.istio.ingress.namespace" .)) (.Values.istio.gateway.existing.namespace) (.Values.istio.gateway.create)) -}}
{{- /* Enumerated allowed headers list (base + user extras) */ -}}
{{- $baseAllowed := list "apikey" "authorization" "x-client-info" "x-supabase-api-version" "Accept" "Accept-Version" "Content-Length" "Content-MD5" "Content-Type" "Date" "X-Auth-Token" "X-Build-Number" "X-Request-Id" -}}
{{- $extra := .Values.istio.cors.extraAllowedHeaders | default list -}}
{{- $allAllowed := concat $baseAllowed $extra -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "common.names.fullname" . }}-preflight
  namespace: {{ include "common.names.namespace" . }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/part-of: supabase
    app.kubernetes.io/component: ingress
    supabase.io/preflight-shim: "true"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $parentGwName }}
      namespace: {{ $parentGwNamespace }}
  hostnames:
    {{- include "supabase.istio.validatedHosts" . | nindent 4 }}
    - {{ include "supabase.api.baseHost" . | quote }}
  rules:
    - matches:
        # Functions
        - path: { type: PathPrefix, value: /functions/v1/ }
          method: OPTIONS
        # Auth fixed endpoints
        - path: { type: PathPrefix, value: /auth/v1/verify }
          method: OPTIONS
        - path: { type: PathPrefix, value: /auth/v1/callback }
          method: OPTIONS
        - path: { type: PathPrefix, value: /auth/v1/authorize }
          method: OPTIONS
        # Auth wildcard
        - path: { type: PathPrefix, value: /auth/v1/ }
          method: OPTIONS
        # REST
        - path: { type: PathPrefix, value: /rest/v1/ }
          method: OPTIONS
        # Realtime
        - path: { type: PathPrefix, value: /realtime/v1/ }
          method: OPTIONS
        # Storage
        - path: { type: PathPrefix, value: /storage/v1/ }
          method: OPTIONS
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Access-Control-Allow-Methods
                value: "GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS"
              - name: Access-Control-Allow-Headers
                value: "{{ join "," $allAllowed }}"
              - name: Vary
                value: "Origin"
      backendRefs:
        - name: {{ include "common.names.fullname" . }}-preflight-shim
          port: 8080
{{- end }}
