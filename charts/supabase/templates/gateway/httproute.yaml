{{- if .Values.garage.backups.listenerset.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.garage.backups.listenerset.name }}
spec:
  parentRefs:
    - kind: ListenerSet
      name: {{ .Values.garage.backups.listenerset.name }}
  hostnames:
    - {{ .Values.garage.backups.listenerset.host }}
  rules:
    - backendRefs:
        - kind: Service
          name: {{ .Values.garage.backups.listenerset.backend.name }}
          port: {{ .Values.garage.backups.listenerset.backend.port }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}