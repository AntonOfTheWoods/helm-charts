{{- if and .Values.realtime.enabled .Values.project.local.enabled .Values.project.local.enableNodePorts -}}
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: realtime
    app.kubernetes.io/name: supabase
    app.kubernetes.io/instance: {{ .Release.Name }}

  name: realtime-nodeport
spec:
  ports:
  - name: nodeport-realtime
    nodePort: 30435
    port: {{ .Values.realtime.service.ports.http }}
    protocol: TCP
    targetPort: {{ .Values.realtime.containerPorts.http }}
  selector:
    app.kubernetes.io/component: realtime
    app.kubernetes.io/name: supabase
    app.kubernetes.io/instance: {{ .Release.Name }}

  type: NodePort
{{- end -}}
